{% extends "base.html" %}
{% block content %}
{% load static %}

<section class="content">
  <div class="header">
    <a href="{% url 'posts:index' %}">
      <img src="{% static 'img/logo-twitter.png' %}" alt="Back to home" />
    </a>
    <h3>Edit Tweet</h3>
  </div>

  <section class="edit">
    <section class="post_form">
      <form
        action="{% url 'posts:edit' post.id %}"
        method="POST"
        enctype="multipart/form-data"
      >
        {% csrf_token %}
        <input
          type="text"
          name="name"
          placeholder="Name"
          value="{{ post.name }}"
          required
        />
        <textarea name="body" placeholder="What's happening?" required>{{ post.body }}</textarea>
        <input type="file" name="image" accept="image/*" />
        {% if post.image %}
        <img class="post-img" src="{{ post.image.url }}" alt="Current image" />
        {% endif %}
        <div class="banner">
          <a class="cancel-anchor" href="{% url 'posts:index' %}">
            <button class="cancel-button" type="button">Cancel</button>
          </a>
          <button id="update-button" type="submit">Update</button>
        </div>
      </form>
    </section>
  </section>
</section>

{% endblock %}
